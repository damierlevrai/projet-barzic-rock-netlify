<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Barzik - Agenda Music Live</title>

  <!-- Lien vers manifest.json -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Meta SEO & PWA -->
  <meta
    name="description"
    content="Barzik - Découvrez les événements rock, concerts et spectacles près de chez vous !"
  />
  <meta name="theme-color" content="#667eea" />
  <meta name="robots" content="index,follow" />

  <!-- Favicons -->
  <link rel="icon" type="image/png" href="/logos/favicon/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/logos/favicon/favicon.svg" />
  <link rel="shortcut icon" href="/logos/favicon/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/logos/favicon/apple-touch-icon.png" />

  <!-- CSS -->
  <link rel="stylesheet" href="./src/styles/dashboard.css">
  <link rel="stylesheet" href="./src/styles/modals.css">
  <link rel="stylesheet" href="./src/styles/publicpage.css">
    

    <style>
      /* 🌀 Loader global pendant l'initialisation */
      .bz-global-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #667eea 0%, #2d1810 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        color: #667eea;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      .loader-content {
        text-align: center;
        animation: pulse 2s ease-in-out infinite alternate;
      }
      .spinner {
        width: 50px;
        height: 50px;
        border: 3px solid rgba(102, 126, 234, 0.3);
        border-radius: 50%;
        border-top-color: #667eea;
        animation: spin 1s linear infinite;
        margin: 0 auto 20px;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
      @keyframes pulse {
        0% {
          opacity: 0.8;
          transform: scale(1);
        }
        100% {
          opacity: 1;
          transform: scale(1.05);
        }
      }
      #app {
        transition: opacity 0.3s ease-in-out;
        min-height: 100vh;
      }
    </style>
  </head>

  <body class="bz-body">
    <!-- 🌀 Loader global -->
    <div id="global-loader" class="bz-global-loader">
      <div class="loader-content">
        <div class="spinner"></div>
        <h2 style="margin: 0 0 10px 0; font-size: 24px; font-weight: 600">
          🎸 Barzik Rock
        </h2>
        <p style="margin: 0; opacity: 0.8; font-size: 16px">
          Chargement des événements...
        </p>
      </div>
    </div>

    <!-- 🎯 Application principale -->
    <div id="app" class="bz-app">
      <div
        style="
          display: flex;
          justify-content: center;
          align-items: center;
          height: 100vh;
          background: #1a1a1a;
          color: #667eea;
          font-family: 'Segoe UI', sans-serif;
          text-align: center;
        "
      >
        <div>
          <h2>🎸 Barzik Rock</h2>
          <p>Initialisation en cours...</p>
        </div>
      </div>
    </div>

<!-- Script d'enregistrement Service Worker -->
<script src="/sw-register.js"></script>

<!-- Script principal Vite -->
<script type="module" src="/src/main.js"></script>
</body>
</html>
